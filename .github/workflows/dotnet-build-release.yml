name: .NET Library Build and Release

permissions:
  contents: write
  checks: write

on:
  workflow_dispatch:
    inputs:
      isRelease:
        description: 'Release build?'
        type: boolean
        required: false
        default: false
      pushToNugetOrg:
        description: 'Push to nuget.org? (for pre-release)'
        type: boolean
        required: false
        default: false
      specifiedVersion:
        description: 'Version (X.X.X) - leave empty for auto'
        required: false
        default: ''
      releaseNotes:
        description: 'Release notes'
        required: false
        default: 'No changes specified'
      reviewer:
        description: 'Reviewer name'
        required: false
        default: 'No review required'
  push:
    branches:
      - main
      - '**'

jobs:
  build:
    uses: ks-no/github-actions-public/.github/workflows/dotnet-library-build.yml@main
    with:
      is-release: ${{ github.event.inputs.isRelease == 'true' }}
      push-to-nuget-org: ${{ github.event.inputs.pushToNugetOrg == 'true' }}
      specified-version: ${{ github.event.inputs.specifiedVersion || '' }}
      release-notes: ${{ github.event.inputs.releaseNotes || 'No changes specified' }}
      reviewer: ${{ github.event.inputs.reviewer || 'No review required' }}
      fetch-submodules: true
      run-windows-build: true
      windows-restore-args: '--disable-parallel --verbosity detailed'
      windows-test-verbosity: 'detailed'
      integration-test-repo: 'fiks-io-client-dotnet-integration-tests'
      integration-test-workflow: 'dotnet-component-test-pipeline-windows.yml'
      integration-test-package-name: 'KS.Fiks.IO.Client'
      ks-runner-app-id: ${{ vars.KS_RUNNER_APP_ID }}
    secrets:
      ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
      ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
      CODE_SIGN_CERT_BASE64: ${{ secrets.CODE_SIGN_CERT_BASE64 }}
      CODE_SIGN_PFX_PASS: ${{ secrets.CODE_SIGN_PFX_PASS }}
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      KS_RUNNER_PRIVATE_KEY: ${{ secrets.KS_RUNNER_PRIVATE_KEY }}
      DEPENDENCY_TRACK_API_KEY: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
